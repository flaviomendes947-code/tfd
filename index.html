<script>
  // ==========================================================================
  // CONFIGURAÇÃO DO SUPABASE — preencha com os dados do SEU projeto
  // (Painel do Supabase → Settings → API)
  // ==========================================================================
  var SUPABASE_URL = "https://xfzwysuoccazqsjufmxs.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhmend5c3VvY2NhenFzanVmbXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3Njc0NTgsImV4cCI6MjA5OTM0MzQ1OH0.Fen-_3CvCxyjFeaXYUDKs3ijzBMaE-3JZKyUynCS5nQ";
  // ==========================================================================

  // Camada de armazenamento: fala diretamente com uma tabela chave/valor
  // ("tfd_kv") no Supabase. Todos os dados são compartilhados entre qualquer
  // pessoa que acesse este link (não há separação por usuário).
  (function(){
    function showFatal(msg){
      var el = document.getElementById('fatal-toast');
      if(!el) return;
      el.textContent = 'Erro: ' + msg;
      el.style.display = 'block';
      clearTimeout(window.__fatalTimer);
      window.__fatalTimer = setTimeout(function(){ el.style.display = 'none'; }, 6000);
    }
    function showBanner(){
      var el = document.getElementById('storage-fallback-banner');
      if(el) el.style.display = 'block';
    }
    window.addEventListener('error', function(e){ showFatal(e.message || 'erro desconhecido'); });
    window.addEventListener('unhandledrejection', function(e){
      var r = e.reason;
      showFatal(r && r.message ? r.message : String(r));
    });

    if(!window.supabase || SUPABASE_URL.indexOf('COLE_AQUI') === 0){
      showBanner();
      showFatal('Configuração do Supabase ausente. Edite SUPABASE_URL e SUPABASE_ANON_KEY no arquivo.');
    }

    var sb = (window.supabase && SUPABASE_URL.indexOf('COLE_AQUI') !== 0)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    window.Store = {
      get: async function(key, shared){
        if(!sb){ showBanner(); return null; }
        try{
          var res = await sb.from('tfd_kv').select('value').eq('key', key).maybeSingle();
          if(res.error) throw res.error;
          return res.data ? {key:key, value:res.data.value, shared:shared} : null;
        }catch(e){ showBanner(); showFatal('Falha ao ler dados: ' + (e.message||e)); return null; }
      },
      set: async function(key, value, shared){
        if(!sb){ showBanner(); return null; }
        try{
          var res = await sb.from('tfd_kv').upsert({ key: key, value: value, updated_at: new Date().toISOString() });
          if(res.error) throw res.error;
          return {key:key, value:value, shared:shared};
        }catch(e){ showBanner(); showFatal('Falha ao salvar dados: ' + (e.message||e)); return null; }
      },
      delete: async function(key, shared){
        if(!sb){ showBanner(); return null; }
        try{
          var res = await sb.from('tfd_kv').delete().eq('key', key);
          if(res.error) throw res.error;
          return {key:key, deleted:true, shared:shared};
        }catch(e){ showBanner(); showFatal('Falha ao excluir dados: ' + (e.message||e)); return null; }
      },
      list: async function(prefix, shared){
        if(!sb){ showBanner(); return {keys:[], prefix:prefix, shared:shared}; }
        try{
          var q = sb.from('tfd_kv').select('key');
          if(prefix) q = q.like('key', prefix + '%');
          var res = await q;
          if(res.error) throw res.error;
          return { keys: (res.data||[]).map(function(r){ return r.key; }), prefix:prefix, shared:shared };
        }catch(e){ showBanner(); showFatal('Falha ao listar dados: ' + (e.message||e)); return {keys:[], prefix:prefix, shared:shared}; }
      }
    };
  })();
</script>

<style>
  :root{
    --bg:#f0f4f9;
    --panel:#ffffff;
    --panel2:#f7f9fc;
    --border:#e2e8f0;
    --border-strong:#c9d4e3;
    --text:#1a2233;
    --muted:#64748b;
    --accent:#3b6ff0;
    --accent-soft:#ebf0fe;
    --accent-dark:#2454c7;
    --danger:#e03e3e;
    --danger-soft:#fef2f2;
    --ok:#16a34a;
    --ok-soft:#f0fdf4;
    --warn:#d97706;
    --warn-soft:#fffbeb;
    --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  }
  #app-root, #app-root *{ box-sizing:border-box; font-family: -apple-system, "Segoe UI", Inter, Roboto, sans-serif; }
  #app-root{ background:var(--bg); color:var(--text); min-height:100%; padding:28px 24px 60px; }

  .header{ display:flex; align-items:center; gap:16px; margin-bottom:18px; }
  .logo{ width:52px; height:52px; border-radius:14px; background:var(--accent); display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 4px 12px rgba(59,111,240,.35); }
  .logo svg{ width:26px; height:26px; }
  .header h1{ font-size:19px; font-weight:700; margin:0; color:var(--text); }
  .header p{ font-size:13px; color:var(--muted); margin:3px 0 0; }

  .banner{ background:var(--warn-soft); border:1px solid #fde68a; color:var(--warn); border-radius:12px; padding:13px 16px; font-size:13px; line-height:1.5; margin-bottom:22px; display:flex; gap:10px; }

  .tabs{ display:flex; gap:8px; margin-bottom:26px; flex-wrap:wrap; }
  .tab{ background:var(--panel); border:1px solid var(--border); color:var(--muted); padding:10px 16px; border-radius:10px; font-size:13.5px; cursor:pointer; font-weight:500; display:flex; align-items:center; gap:8px; transition:.15s; box-shadow:var(--shadow); }
  .tab:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
  .tab.active{ background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 12px rgba(59,111,240,.3); }

  .section-title{ font-size:11.5px; letter-spacing:.07em; color:var(--muted); font-weight:700; margin:24px 0 12px; text-transform:uppercase; }
  .section-title:first-child{ margin-top:0; }

  .grid{ display:grid; gap:16px; }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-2{ grid-template-columns:repeat(2,1fr); }
  @media(max-width:820px){ .grid-3,.grid-2{ grid-template-columns:1fr; } }

  label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:500; }
  label .req{ color:var(--danger); }
  input, select, textarea{
    width:100%; background:var(--panel2); border:1.5px solid var(--border); color:var(--text);
    padding:11px 13px; border-radius:9px; font-size:14.5px; outline:none; transition:.15s;
  }
  input::placeholder, textarea::placeholder{ color:#aab4c4; }
  input:focus, select:focus, textarea:focus{ border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(59,111,240,.12); }
  input:disabled{ background:#f1f5f9; color:var(--muted); cursor:not-allowed; }
  textarea{ resize:vertical; min-height:90px; }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function onlyDigits(v){ return (v||"").replace(/\D/g, ""); }

function maskCPF(v){
  const d = onlyDigits(v).slice(0,11);
  if(d.length <= 3) return d;
  if(d.length <= 6) return d.replace(/(\d{3})(\d+)/, '$1.$2');
  if(d.length <= 9) return d.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
  return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
}

function maskCNS(v){
  const d = onlyDigits(v).slice(0,15);
  const parts = [d.slice(0,3), d.slice(3,7), d.slice(7,11), d.slice(11,15)].filter(Boolean);
  return parts.join(' ');
}

// Campo CPF/CNS aceita ambos: CPF tem 11 dígitos, CNS (Cartão Nacional de Saúde) tem 15.
function maskCpfCns(v){
  const d = onlyDigits(v);
  return d.length > 11 ? maskCNS(v) : maskCPF(v);
}

function maskPhone(v){
  const d = onlyDigits(v).slice(0,11);
  if(d.length <= 2) return d.length ? `(${d}` : d;
  if(d.length <= 6) return `(${d.slice(0,2)}) ${d.slice(2)}`;
  if(d.length <= 10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
}

// Monta o link do WhatsApp com a mensagem de confirmação da viagem já preenchida
function whatsappConfirmacaoLink(p){
  const digits = onlyDigits(p.telefone || "");
  if(!digits) return null;
  const comDDI = digits.length <= 11 ? "55" + digits : digits;
  const dataFormatada = p.dataViagem ? new Date(p.dataViagem+"T00:00").toLocaleDateString('pt-BR') : "a definir";
  const horario = p.horarioSaida ? ` às ${p.horarioSaida}` : "";
  const msg = `Olá, ${p.nome}! Confirmando seu transporte (TFD) agendado para ${dataFormatada}${horario}, com destino a ${p.local || "definir"}.\n\nPor favor, esteja pronto(a) no horário combinado. Caso não possa comparecer, avise-nos com antecedência.`;
  return `https://wa.me/${comDDI}?text=${encodeURIComponent(msg)}`;
}


// Valida os dígitos verificadores do CPF (não valida CNS, que usa outro algoritmo)
function isValidCPF(cpf){
  const d = onlyDigits(cpf);
  if(d.length !== 11) return false;
  if(/^(\d)\1{10}$/.test(d)) return false;
  let sum = 0;
  for(let i=0;i<9;i++) sum += parseInt(d[i],10) * (10-i);
  let rev = 11 - (sum % 11);
  if(rev >= 10) rev = 0;
  if(rev !== parseInt(d[9],10)) return false;
  sum = 0;
  for(let i=0;i<10;i++) sum += parseInt(d[i],10) * (11-i);
  rev = 11 - (sum % 11);
  if(rev >= 10) rev = 0;
  if(rev !== parseInt(d[10],10)) return false;
  return true;
}

function useCollection(prefix){
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try{
      const listRes = await Store.list(prefix, true);
      const keys = (listRes && listRes.keys) ? listRes.keys : [];
      const results = await Promise.all(keys.map(async k => {
        try{
          const r = await Store.get(k, true);
          return r ? JSON.parse(r.value) : null;
        }catch(e){ return null; }
      }));
      setItems(results.filter(Boolean).sort((a,b)=> (b.createdAt||0)-(a.createdAt||0)));
    }catch(e){
      setItems([]);
    }
    setLoading(false);
  }, [prefix]);

  useEffect(() => { load(); }, [load]);

  const save = useCallback(async (record) => {
    const rec = { ...record };
    if(!rec.id) rec.id = uid();
    if(!rec.createdAt) rec.createdAt = Date.now();
    await Store.set(prefix + rec.id, JSON.stringify(rec), true);
    await load();
    return rec;
  }, [prefix, load]);

  const remove = useCallback(async (id) => {
    await Store.delete(prefix + id, true);
    await load();
  }, [prefix, load]);

  return { items, loading, save, remove, reload: load };
}

function useListasOpcoes(){
  const KEY = "tfd_listas_opcoes";
  const [listas, setListas] = useState({ destinos: DESTINOS_PADRAO, motivos: MOTIVOS_PADRAO, locais: LOCAIS_PADRAO });
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try{
      const r = await Store.get(KEY, true);
      const parsed = r ? JSON.parse(r.value) : null;
      setListas({
        destinos: (parsed && Array.isArray(parsed.destinos)) ? parsed.destinos : DESTINOS_PADRAO,
        motivos: (parsed && Array.isArray(parsed.motivos)) ? parsed.motivos : MOTIVOS_PADRAO,
        locais: (parsed && Array.isArray(parsed.locais)) ? parsed.locais : LOCAIS_PADRAO
      });
    }catch(e){
      setListas({ destinos: DESTINOS_PADRAO, motivos: MOTIVOS_PADRAO, locais: LOCAIS_PADRAO });
    }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const salvar = useCallback(async (novasListas) => {
    setListas(novasListas);
    try{ await Store.set(KEY, JSON.stringify(novasListas), true); }catch(e){}
  }, []);

  return { listas, loading, salvar, reload: load };
}

}

function QuickScheduleModal({ solicitacao, motoristas, onConfirm, onCancel }){
  const [motoristaId, setMotoristaId] = useState("");
  return <div className="modal-overlay" onClick={onCancel}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>Confirmar viagem</h3>
      <p>Selecione o motorista/veículo responsável por levar <strong>{solicitacao.nome}</strong> até <strong>{solicitacao.destino || "o destino"}</strong>. O status será atualizado para "Agendado".</p>

        <select value={motoristaId} onChange={e=>setMotoristaId(e.target.value)}>

        <button className="btn btn-primary" disabled={!motoristaId} onClick={()=>onConfirm(motoristaId)}>Confirmar</button>
      </div>
    </div>
  </div>;
}

function SolicitacaoForm({ save, notify, editTarget, onDone, onRequestDelete, motoristas = [], solicitacoes = [], listas }){
  const listaDestinos = (listas && listas.destinos) || DESTINOS_PADRAO;
  const listaMotivos = (listas && listas.motivos) || MOTIVOS_PADRAO;
  const listaLocais = (listas && listas.locais) || LOCAIS_PADRAO;
  const [form, setForm] = useState(editTarget || blankSolicitacao());
  useEffect(()=>{ setForm(editTarget || blankSolicitacao()); }, [editTarget]);
  const set = (k) => (e) => setForm(f => ({...f, [k]: e.target.value}));
  const setCpf = (e) => setForm(f => ({...f, cpf: maskCpfCns(e.target.value)}));
  const setTelefone = (e) => setForm(f => ({...f, telefone: maskPhone(e.target.value)}));

  const [buscaPaciente, setBuscaPaciente] = useState("");

  // Lista de pacientes já cadastrados (um por CPF/CNS), com dados pessoais mais recentes e total de viagens.
  const pacientesConhecidos = useMemo(() => {
    const map = new Map();
    solicitacoes.forEach(p => {
      const chave = onlyDigits(p.cpf || "");
      if(!chave) return;
      const atual = map.get(chave);
      if(!atual || (p.createdAt||0) > (atual.createdAt||0)){
        map.set(chave, p);
      }
    });
    return Array.from(map.entries()).map(([chave, p]) => ({
      chave,
      nome: p.nome, cpf: p.cpf, nascimento: p.nascimento, sexo: p.sexo,
      telefone: p.telefone, endereco: p.endereco,
      totalViagens: solicitacoes.filter(s => onlyDigits(s.cpf||"") === chave).length
    }));
  }, [solicitacoes]);

  const sugestoes = useMemo(() => {
    const t = buscaPaciente.trim().toLowerCase();
    if(!t) return [];
    const tDigits = onlyDigits(buscaPaciente);
    return pacientesConhecidos.filter(p =>
      p.nome.toLowerCase().includes(t) ||
      (tDigits && p.chave.includes(tDigits)) ||
      (tDigits && onlyDigits(p.telefone||"").includes(tDigits))
    ).slice(0, 6);
  }, [buscaPaciente, pacientesConhecidos]);

  const usarPacienteExistente = (p) => {
    setForm(f => ({
      ...blankSolicitacao(),
      nome: p.nome, cpf: p.cpf, nascimento: p.nascimento, sexo: p.sexo,
      telefone: p.telefone, endereco: p.endereco
    }));
    setBuscaPaciente("");
    notify(`Dados de ${p.nome} preenchidos. Complete os dados da nova viagem.`);
  };

  const handleSubmit = async () => {
    if(!form.tipoAgendamento || !form.nome || !form.cpf || !form.nascimento || !form.telefone || !form.destino || !form.dataViagem){
      notify("Preencha os campos obrigatórios (*)");
      return;
    }
    const cpfDigits = onlyDigits(form.cpf);
    if(cpfDigits.length === 11){
      if(!isValidCPF(cpfDigits)){ notify("CPF inválido. Verifique os números digitados."); return; }
    } else if(cpfDigits.length !== 15){
      notify("CPF ou CNS inválido. CPF deve ter 11 dígitos e CNS 15 dígitos.");
      return;
    }
    const phoneDigits = onlyDigits(form.telefone);
    if(phoneDigits.length < 10 || phoneDigits.length > 11){
      notify("Telefone inválido. Informe DDD + número.");
      return;
    }

    const duplicada = solicitacoes.find(s =>
      s.id !== form.id &&
      onlyDigits(s.cpf||"") === cpfDigits &&
      s.dataViagem === form.dataViagem &&
      !["Cancelada pela secretaria", "Cancelada pelo paciente"].includes(s.resultadoViagem)
    );
    if(duplicada){
      const dataFormatada = duplicada.dataViagem ? new Date(duplicada.dataViagem+"T00:00").toLocaleDateString('pt-BR') : duplicada.dataViagem;
      const confirmar = window.confirm(
        `Já existe uma solicitação para ${duplicada.nome} na data ${dataFormatada} (destino: ${duplicada.destino || "—"}).\n\nDeseja cadastrar mesmo assim?`
      );
      if(!confirmar) return;
    }

    await save(form);
    notify(editTarget ? "Solicitação atualizada" : "Solicitação de transporte cadastrada");
    setForm(blankSolicitacao());
    if(onDone) onDone();
  };

  return <div className="card">
    {!editTarget && (
      <>
        <div className="section-title">Paciente já atendido anteriormente?</div>
        <div className="grid grid-2" style={{marginBottom:16}}>
          <Field label="Buscar paciente cadastrado por nome, CPF/CNS ou telefone">
            <input placeholder="Digite o nome, CPF/CNS ou telefone do paciente..." value={buscaPaciente} onChange={e=>setBuscaPaciente(e.target.value)} />
          </Field>
        </div>
        {sugestoes.length > 0 && (
          <div style={{marginTop:-8, marginBottom:20, border:'1px solid var(--border)', borderRadius:10, overflow:'hidden'}}>
            {sugestoes.map(p => (
              <div key={p.chave} onClick={()=>usarPacienteExistente(p)}
                style={{padding:'11px 14px', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid var(--border)', background:'var(--panel)'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--accent-soft)'}
                onMouseLeave={e=>e.currentTarget.style.background='var(--panel)'}>
                <span><strong>{p.nome}</strong> <span style={{color:'var(--muted)', fontSize:13}}>— {p.cpf}</span></span>
                <span style={{fontSize:12, color:'var(--muted)'}}>{p.totalViagens} viage{p.totalViagens!==1?"ns":"m"} anterior{p.totalViagens!==1?"es":""}</span>
              </div>
            ))}
          </div>
        )}
      </>
    )}

    <div className="section-title">Tipo de agendamento</div>
    <div className="grid grid-2">
      <Field label="O agendamento é normal ou excepcional?" required>
        <select value={form.tipoAgendamento} onChange={set('tipoAgendamento')}>
          <option value="">Selecione</option>
          {TIPOS_AGENDAMENTO.map(t => <option key={t}>{t}</option>)}
        </select>
      </Field>
    </div>

    <div className="section-title">Dados do paciente</div>
    <div className="grid grid-2">
      <Field label="Nome completo" required><input placeholder="Nome completo do paciente" value={form.nome} onChange={set('nome')} /></Field>
      <Field label="CPF / CNS" required><input placeholder="000.000.000-00" value={form.cpf} onChange={setCpf} maxLength={20} /></Field>
    </div>
    <div className="grid grid-2" style={{marginTop:16}}>
      <Field label="Data de nascimento" required><input type="date" value={form.nascimento} onChange={set('nascimento')} /></Field>
      <Field label="Sexo">
        <select value={form.sexo} onChange={set('sexo')}>
          <option value="">Selecione</option><option>Feminino</option><option>Masculino</option><option>Outro</option>
        </select>
      </Field>
    </div>

    <div className="section-title">Contato</div>
    <div className="grid grid-2">
      <Field label="Telefone" required><input placeholder="(00) 00000-0000" value={form.telefone} onChange={setTelefone} maxLength={15} /></Field>
      <Field label="Endereço"><input placeholder="Rua, número, bairro, cidade" value={form.endereco} onChange={set('endereco')} /></Field>
    </div>
    <div className="grid grid-2" style={{marginTop:16}}>
      <Field label="Ponto de referência"><input placeholder="Ex: perto da praça, próximo ao mercado..." value={form.pontoReferencia} onChange={set('pontoReferencia')} /></Field>
    </div>

    <div className="section-title">Dados da viagem</div>
    <div className="grid grid-2">
      <Field label="Município" required>
        <select value={form.destino} onChange={set('destino')}>
          <option value="">Selecione</option>
          {listaDestinos.map(d => <option key={d}>{d}</option>)}
        </select>
      </Field>
      <Field label="Motivo / especialidade">
        <select value={form.motivo} onChange={set('motivo')}>
          <option value="">Selecione</option>
          {listaMotivos.map(m => <option key={m}>{m}</option>)}
        </select>
      </Field>
    </div>
    <div className="grid grid-2" style={{marginTop:16}}>
      <Field label="Destino">
        <select value={form.local} onChange={set('local')}>
          <option value="">Selecione</option>
          {listaLocais.map(l => <option key={l}>{l}</option>)}
        </select>
      </Field>
    </div>
    <div className="grid grid-2" style={{marginTop:16}}>
      <Field label="Data da viagem / consulta" required><input type="date" value={form.dataViagem} onChange={set('dataViagem')} /></Field>
      <Field label="Horário de saída"><input type="time" value={form.horarioSaida} onChange={set('horarioSaida')} /></Field>
    </div>
    <div className="grid grid-3" style={{marginTop:16}}>
      <Field label="Tipo de veículo">
        <select value={form.tipoTransporte} onChange={set('tipoTransporte')}>
          <option value="">Selecione</option>
          {VEICULOS.map(v => <option key={v}>{v}</option>)}
        </select>
      </Field>
      <Field label="Necessita acompanhante?">
        <select value={form.acompanhante} onChange={set('acompanhante')}>

    <div className="grid grid-3" style={{marginTop:16}}>

function StatusBadge({ status }){
  const cls = (status === "Ativo" || status === "Agendado" || status === "Realizada") ? "badge-ativo"
    : status === "Em pausa" ? "badge-pausa"
    : status === "Lista de espera" ? "badge-espera"
    : "badge-inativo";
  return <span className={"badge " + cls}>{status}</span>;
}

function desfechoStyle(valor){
  const map = {
    "Realizada": {background:"#dcfce7", color:"#15803d", border:"1px solid #bbf7d0"},
    "Cancelada pela secretaria": {background:"#ffedd5", color:"#c2410c", border:"1px solid #fed7aa"},
    "Cancelada pelo paciente": {background:"#fee2e2", color:"#b91c1c", border:"1px solid #fecaca"},
    "Paciente faltou": {background:"#f3e8ff", color:"#7e22ce", border:"1px solid #e9d5ff"},
  };
  return map[valor] || {background:"var(--panel2, #f1f5f9)", color:"var(--muted)", border:"1px solid var(--border, #e2e8f0)"};
}

function SolicitacoesList({ solicitacoes, loading, onEdit, onDelete, motoristas, save }){
  const [q, setQ] = useState("");
  const [fStatus, setFStatus] = useState("");
  const [fDestino, setFDestino] = useState("");
  const [fMotorista, setFMotorista] = useState("");
  const [fDesfecho, setFDesfecho] = useState("");
  const [fDataIni, setFDataIni] = useState("");
  const [fDataFim, setFDataFim] = useState("");

  const uniq = (arr) => Array.from(new Set(arr.filter(Boolean)));
  const destinoOptions = useMemo(()=> uniq(solicitacoes.map(p=>p.local)), [solicitacoes]);
  const motoristaName = (id) => { const m = (motoristas||[]).find(x=>x.id===id); return m ? m.nome : "—"; };

  const filtered = useMemo(() => {
    const t = q.toLowerCase();
    return solicitacoes.filter(p =>
      (p.nome||"").toLowerCase().includes(t) &&
      (!fStatus || p.status === fStatus) &&
      (!fDestino || p.local === fDestino) &&
      (!fMotorista || p.motoristaId === fMotorista) &&
      (!fDesfecho || (fDesfecho === "Sem desfecho" ? !p.resultadoViagem : p.resultadoViagem === fDesfecho)) &&
      (!fDataIni || (p.dataViagem && p.dataViagem >= fDataIni)) &&
      (!fDataFim || (p.dataViagem && p.dataViagem <= fDataFim))
    );
  }, [solicitacoes, q, fStatus, fDestino, fMotorista, fDesfecho, fDataIni, fDataFim]);

  const stats = useMemo(() => ({
    total: filtered.length,
    agendado: filtered.filter(p=>p.status==="Agendado").length,
    espera: filtered.filter(p=>p.status==="Lista de espera").length,
    realizada: filtered.filter(p=>p.resultadoViagem==="Realizada").length,
    canceladaSecretaria: filtered.filter(p=>p.resultadoViagem==="Cancelada pela secretaria").length,
    canceladaPaciente: filtered.filter(p=>p.resultadoViagem==="Cancelada pelo paciente").length,
    faltou: filtered.filter(p=>p.resultadoViagem==="Paciente faltou").length,
  }), [filtered]);

  const hasFilters = fStatus || fDestino || fMotorista || fDesfecho || fDataIni || fDataFim;
  const clearAll = () => { setFStatus(""); setFDestino(""); setFMotorista(""); setFDesfecho(""); setFDataIni(""); setFDataFim(""); };

  return <div className="card">
    <div className="stat-row" style={{display:"flex", flexWrap:"wrap", gap:10, marginBottom:16}}>
      <div className="count-pill" style={{background:"#eef2ff", color:"#4338ca", border:"1px solid #c7d2fe"}}>Total: {stats.total}</div>
      <div className="count-pill" style={{background:"#e0f2fe", color:"#0369a1", border:"1px solid #bae6fd"}}>Agendadas: {stats.agendado}</div>
      <div className="count-pill" style={{background:"#fef9c3", color:"#a16207", border:"1px solid #fde68a"}}>Lista de espera: {stats.espera}</div>
      <div className="count-pill" style={{background:"#dcfce7", color:"#15803d", border:"1px solid #bbf7d0"}}>Realizadas: {stats.realizada}</div>
      <div className="count-pill" style={{background:"#ffedd5", color:"#c2410c", border:"1px solid #fed7aa"}}>Canceladas (secretaria): {stats.canceladaSecretaria}</div>
      <div className="count-pill" style={{background:"#fee2e2", color:"#b91c1c", border:"1px solid #fecaca"}}>Canceladas (paciente): {stats.canceladaPaciente}</div>
      <div className="count-pill" style={{background:"#f3e8ff", color:"#7e22ce", border:"1px solid #e9d5ff"}}>Faltas: {stats.faltou}</div>
    </div>
    <div className="toolbar">
      <input placeholder="Buscar por nome..." value={q} onChange={e=>setQ(e.target.value)} />
      <select style={{maxWidth:180}} value={fDestino} onChange={e=>setFDestino(e.target.value)}>
        <option value="">Destino (todos)</option>
        {destinoOptions.map(c => <option key={c} value={c}>{c}</option>)}
      </select>
      <select style={{maxWidth:180}} value={fMotorista} onChange={e=>setFMotorista(e.target.value)}>
        <option value="">Motorista (todos)</option>
        {motoristas.map(m => <option key={m.id} value={m.id}>{m.nome}</option>)}
      </select>
      <select style={{maxWidth:200}} value={fDesfecho} onChange={e=>setFDesfecho(e.target.value)}>
        <option value="">Desfecho (todos)</option>
        {RESULTADOS_VIAGEM.map(r => <option key={r} value={r}>{r}</option>)}
        <option value="Sem desfecho">Sem desfecho</option>
      </select>
      <span style={{display:"flex", alignItems:"center", gap:6, fontSize:13, color:"var(--muted)"}}>
        De <input type="date" style={{maxWidth:150}} value={fDataIni} onChange={e=>setFDataIni(e.target.value)} />
        até <input type="date" style={{maxWidth:150}} value={fDataFim} onChange={e=>setFDataFim(e.target.value)} />
      </span>
      {hasFilters && <button className="btn btn-secondary" style={{padding:'10px 14px'}} onClick={clearAll}>Limpar filtros</button>}
      <span className="count-pill">{filtered.length} solicitaç{filtered.length!==1?"ões":"ão"}</span>
    </div>
    {loading ? <div className="loading">Carregando...</div> :
    filtered.length === 0 ? (
      <div className="empty-state">
        <IconVan/>
        <div>Nenhuma solicitação encontrada. Use "Nova solicitação" para começar.</div>
      </div>
    ) : (
      <table>
        <thead><tr><th>Data do agendamento</th><th>Nome</th><th>Nascimento</th><th>Telefone</th><th>Destino</th><th>Motorista</th><th>Data da viagem</th><th>Status</th><th>Desfecho viagem</th><th></th></tr></thead>
        <tbody>
          {filtered.map(p => (
            <tr key={p.id}>
              <td>{p.dataAgendamento ? new Date(p.dataAgendamento+"T00:00").toLocaleDateString('pt-BR') : "—"}</td>
              <td>{p.nome}</td>
              <td>{p.nascimento ? new Date(p.nascimento+"T00:00").toLocaleDateString('pt-BR') : "—"}</td>
              <td>{p.telefone || "—"}</td>
              <td>{p.local || "—"}</td>
              <td>{p.status === "Agendado" ? motoristaName(p.motoristaId) : "—"}</td>
              <td>{p.dataViagem ? new Date(p.dataViagem+"T00:00").toLocaleDateString('pt-BR') : "—"}</td>
              <td><StatusBadge status={p.status}/></td>
              <td>
                <select
                  value={p.resultadoViagem || ""}
                  onChange={async (e) => { await save({ ...p, resultadoViagem: e.target.value }); }}
                  style={{padding:'6px 8px', fontSize:13, borderRadius:20, fontWeight:600, ...desfechoStyle(p.resultadoViagem)}}
                >
                  <option value="">—</option>
                  {RESULTADOS_VIAGEM.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </td>
              <td>
                <div className="row-actions">
                  {whatsappConfirmacaoLink(p) &&
                    <button className="icon-btn" title="Enviar confirmação por WhatsApp"
                      onClick={()=>window.open(whatsappConfirmacaoLink(p), '_blank')}
                      style={{color:'#25D366'}}>
                      <IconWhatsapp/>
                    </button>}
                  <button className="icon-btn" onClick={()=>onEdit(p)}><IconEdit/></button>
                  <button className="icon-btn danger" onClick={()=>onDelete(p)}><IconTrash/></button>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    )}
  </div>;
}

function toCSV(rows, headers){
  const esc = (v) => `"${String(v??"").replace(/"/g,'""')}"`;
  const lines = [headers.map(h=>esc(h.label)).join(",")];
  rows.forEach(r => lines.push(headers.map(h=>esc(r[h.key])).join(",")));
  return lines.join("\n");
}

function downloadCSV(filename, csv){
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function JsonViewerModal({ solicitacoes, motoristas, onClose, notify }){
  const data = { solicitacoes, motoristas };
  const json = JSON.stringify(data, null, 2);
  const copy = async () => {
    try{ await navigator.clipboard.writeText(json); notify("JSON copiado para a área de transferência"); }
    catch(e){ notify("Não foi possível copiar automaticamente. Selecione o texto manualmente."); }
  };
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" style={{maxWidth:760, maxHeight:'85vh', display:'flex', flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
      <h3>Dados brutos (JSON)</h3>
      <p>{solicitacoes.length} solicitação(ões) · {motoristas.length} motorista(s)</p>
      <pre style={{
        background:'var(--panel2)', border:'1px solid var(--border)', borderRadius:9,
        padding:16, fontSize:12.5, lineHeight:1.5, overflow:'auto', flex:1,
        whiteSpace:'pre', color:'var(--text)', fontFamily:'ui-monospace, Menlo, monospace'
      }}>{json}</pre>
      <div className="actions-row">
        <button className="btn btn-secondary" onClick={onClose}>Fechar</button>
        <button className="btn btn-primary" onClick={copy}>Copiar JSON</button>
      </div>
    </div>
  </div>;
}

function ExportTab({ solicitacoes, motoristas, notify }){
  const [showJson, setShowJson] = useState(false);
  const [pdfDataIni, setPdfDataIni] = useState("");
  const [pdfDataFim, setPdfDataFim] = useState("");
  const [pdfStatus, setPdfStatus] = useState("");
  const [pdfDesfecho, setPdfDesfecho] = useState("");

  const exportSolicitacoes = () => {
    const motoristaName = (id) => { const m = motoristas.find(x=>x.id===id); return m ? m.nome : ""; };
    const rows = solicitacoes.map(p => ({...p, motoristaNome: motoristaName(p.motoristaId)}));
    const headers = [
      {key:'nome',label:'Nome'},{key:'cpf',label:'CPF/CNS'},{key:'nascimento',label:'Nascimento'},
      {key:'sexo',label:'Sexo'},{key:'telefone',label:'Telefone'},
      {key:'endereco',label:'Endereço'},{key:'pontoReferencia',label:'Ponto de referência'},{key:'unidade',label:'Unidade de origem'},
      {key:'destino',label:'Destino'},{key:'motivo',label:'Motivo'},{key:'local',label:'Local'},{key:'enderecoLocal',label:'Endereço do local'},
      {key:'dataViagem',label:'Data da viagem'},{key:'horarioSaida',label:'Horário de saída'},{key:'pontoReferenciaSaida',label:'Ponto de referência de saída'},
      {key:'tipoTransporte',label:'Tipo de veículo'},{key:'acompanhante',label:'Acompanhante'},
      {key:'nomeAcompanhante',label:'Nome do acompanhante'},{key:'prioridade',label:'Prioridade'},
      {key:'status',label:'Status'},{key:'motoristaNome',label:'Motorista'},{key:'agendadoPor',label:'Agendado por'},
      {key:'resultadoViagem',label:'Desfecho da viagem'},{key:'dataRealizacao',label:'Data de realização'},
      {key:'obs',label:'Observações'}
    ];
    downloadCSV("solicitacoes-tfd.csv", toCSV(rows, headers));
    notify("Exportação de solicitações baixada");
  };
  const exportMotoristas = () => {
    const headers = [{key:'nome',label:'Nome'},{key:'tipoVeiculo',label:'Tipo de veículo'},{key:'placa',label:'Placa'},{key:'cnh',label:'CNH'},{key:'telefone',label:'Telefone'},{key:'status',label:'Status'}];
    downloadCSV("motoristas.csv", toCSV(motoristas, headers));
    notify("Exportação de motoristas baixada");
  };

  const fmtBR = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";
  const motoristaName = (id) => { const m = motoristas.find(x=>x.id===id); return m ? m.nome : "—"; };

  const pdfFiltradas = useMemo(() => {
    return solicitacoes.filter(p =>
      (!pdfDataIni || (p.dataViagem && p.dataViagem >= pdfDataIni)) &&
      (!pdfDataFim || (p.dataViagem && p.dataViagem <= pdfDataFim)) &&
      (!pdfStatus || p.status === pdfStatus) &&
      (!pdfDesfecho || (pdfDesfecho === "Sem desfecho" ? !p.resultadoViagem : p.resultadoViagem === pdfDesfecho))
    ).sort((a,b) => (a.dataViagem||"").localeCompare(b.dataViagem||""));
  }, [solicitacoes, pdfDataIni, pdfDataFim, pdfStatus, pdfDesfecho]);

  const gerarPdf = () => {
    if(!window.jspdf){ notify("Não foi possível carregar o gerador de PDF. Verifique sua conexão."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();

    // Timbre com o brasão no canto superior direito
    try{ doc.addImage(BRASAO_LOGO_URI, "PNG", pageW - 24, 8, 16, 16); }catch(e){}

    // Marca d'água discreta centralizada na página
    try{
      doc.saveGraphicsState();
      doc.setGState(new doc.GState({ opacity: 0.06 }));
      const wSize = 120;
      doc.addImage(BRASAO_LOGO_URI, "PNG", (pageW - wSize) / 2, (pageH - wSize) / 2, wSize, wSize);
      doc.restoreGraphicsState();
    }catch(e){}

    doc.setFontSize(14);
    doc.text("TRANSPORTE FORA DO DOMICÍLIO (TFD) — Relatório de Solicitações", 14, 15);
    doc.setFontSize(10);
    doc.setTextColor(100);
    const periodoTxt = (pdfDataIni || pdfDataFim)
      ? `Período: ${pdfDataIni ? fmtBR(pdfDataIni) : "início"} até ${pdfDataFim ? fmtBR(pdfDataFim) : "hoje"}`
      : "Período: todos os registros";
    doc.text(periodoTxt, 14, 21);
    doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 14, 26);

    const total = pdfFiltradas.length;
    const realizadas = pdfFiltradas.filter(p=>p.resultadoViagem==="Realizada").length;
    const canceladasSec = pdfFiltradas.filter(p=>p.resultadoViagem==="Cancelada pela secretaria").length;
    const canceladasPac = pdfFiltradas.filter(p=>p.resultadoViagem==="Cancelada pelo paciente").length;
    const faltas = pdfFiltradas.filter(p=>p.resultadoViagem==="Paciente faltou").length;
    doc.setTextColor(0);
    doc.setFontSize(10);
    doc.text(`Total: ${total}  |  Realizadas: ${realizadas}  |  Canceladas (secretaria): ${canceladasSec}  |  Canceladas (paciente): ${canceladasPac}  |  Faltas: ${faltas}`, 14, 33);

    doc.autoTable({
      startY: 38,
      head: [["Nome", "Destino", "Local", "Data", "Motorista", "Status", "Desfecho"]],
      body: pdfFiltradas.map(p => [
        p.nome || "—", p.destino || "—", p.local || "—", fmtBR(p.dataViagem),
        p.status === "Agendado" ? motoristaName(p.motoristaId) : "—",
        p.status || "—", p.resultadoViagem || "—"
      ]),
      styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [59, 111, 240] },
      margin: { left: 14, right: 14 }
    });

    doc.save(`relatorio-tfd-${new Date().toISOString().slice(0,10)}.pdf`);
    notify("Relatório em PDF gerado");
  };

  return <div className="card">
    <div className="section-title" style={{marginTop:0}}>Relatório em PDF</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:16}}>Gere um relatório formatado, ideal para prestar contas à secretaria. Use os filtros abaixo para restringir o período ou o tipo de registro (deixe em branco para incluir tudo).</p>
    <div className="grid grid-2">
      <span style={{display:"flex", alignItems:"center", gap:6, fontSize:13, color:"var(--muted)"}}>
        De <input type="date" style={{maxWidth:150}} value={pdfDataIni} onChange={e=>setPdfDataIni(e.target.value)} />
        até <input type="date" style={{maxWidth:150}} value={pdfDataFim} onChange={e=>setPdfDataFim(e.target.value)} />
      </span>
      <select value={pdfStatus} onChange={e=>setPdfStatus(e.target.value)}>
        <option value="">Status (todos)</option>
        <option>Agendado</option><option>Lista de espera</option>
      </select>
    </div>
    <div className="grid grid-2" style={{marginTop:16}}>
      <select value={pdfDesfecho} onChange={e=>setPdfDesfecho(e.target.value)}>
        <option value="">Desfecho (todos)</option>
        {RESULTADOS_VIAGEM.map(r => <option key={r} value={r}>{r}</option>)}
        <option value="Sem desfecho">Sem desfecho</option>
      </select>
    </div>
    <div className="actions-row" style={{marginTop:16}}>
      <button className="btn btn-primary" onClick={gerarPdf} disabled={pdfFiltradas.length===0}>
        <IconPrint/> Gerar PDF ({pdfFiltradas.length} registro{pdfFiltradas.length!==1?"s":""})
      </button>
    </div>

    <div className="section-title">Exportar dados (CSV)</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:20}}>Baixe os dados atuais em formato CSV, compatível com Excel e Google Planilhas.</p>
    <div className="grid grid-2">
      <button className="btn btn-secondary" onClick={exportSolicitacoes}>Exportar solicitações ({solicitacoes.length})</button>
      <button className="btn btn-secondary" onClick={exportMotoristas}>Exportar motoristas ({motoristas.length})</button>
    </div>

    <div className="section-title">Dados brutos</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:20}}>Visualize todo o banco de dados em formato JSON, direto na tela.</p>
    <button className="btn btn-secondary" onClick={()=>setShowJson(true)}>Abrir dados em JSON</button>

    {showJson && <JsonViewerModal solicitacoes={solicitacoes} motoristas={motoristas} onClose={()=>setShowJson(false)} notify={notify} />}
  </div>;
}

function WaitingListTab({ solicitacoes, loading, onEdit, motoristas = [], save, notify }){
  const [q, setQ] = useState("");
  const [quickSolicitacao, setQuickSolicitacao] = useState(null);
  const waiting = useMemo(() => solicitacoes.filter(p => p.status === "Lista de espera"), [solicitacoes]);

  const PRIORIDADE_ORDEM = { "Alta": 0, "Moderada": 1, "Leve": 2, "": 3 };
  const sortByPriority = (list) => [...list].sort((a, b) => {
    const pa = PRIORIDADE_ORDEM[a.prioridade || ""] ?? 3;
    const pb = PRIORIDADE_ORDEM[b.prioridade || ""] ?? 3;
    if(pa !== pb) return pa - pb;
    const da = a.dataViagem ? new Date(a.dataViagem+"T00:00").getTime() : Infinity;
    const db = b.dataViagem ? new Date(b.dataViagem+"T00:00").getTime() : Infinity;
    return da - db;
  });

  const filtered = useMemo(() => {
    const t = q.toLowerCase();
    const base = waiting.filter(p =>
      (p.nome||"").toLowerCase().includes(t) ||
      (p.destino||"").toLowerCase().includes(t)
    );
    return sortByPriority(base);
  }, [waiting, q]);

  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";
  const calcIdade = (nasc) => {
    if(!nasc) return "—";
    const diff = Date.now() - new Date(nasc+"T00:00").getTime();
    return Math.floor(diff / (365.25*24*3600*1000)) + " anos";
  };
  const diasEspera = (dataViagem) => {
    if(!dataViagem) return "—";
    const diff = Date.now() - new Date(dataViagem+"T00:00").getTime();
    return Math.floor(diff / (24*3600*1000)) + " dias";
  };
  const prioridadeBadge = (p) => {
    if(!p) return <span style={{color:'var(--muted)'}}>—</span>;
    const cls = p === "Alta" ? "badge-inativo" : p === "Moderada" ? "badge-pausa" : "badge-ativo";
    return <span className={"badge " + cls}>{p}</span>;
  };

  const byDestino = useMemo(() => {
    const map = {};
    waiting.forEach(p => {
      const d = p.destino || "Não informado";
      map[d] = (map[d]||0) + 1;
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [waiting]);

  return <div>
    <div className="stat-grid">
      <div className="stat-card blue">
        <div className="stat-num">{waiting.length}</div>
        <div className="stat-label">Total em lista de espera</div>
      </div>
      <div className="stat-card green">
        <div className="stat-num">{solicitacoes.filter(p=>p.status==="Agendado").length}</div>
        <div className="stat-label">Viagens agendadas</div>
      </div>
    </div>

    {byDestino.length > 0 && <div className="card" style={{marginBottom:16}}>
      <div className="section-title">Lista de espera por destino</div>
      <table>
        <thead><tr><th>Destino</th><th>Pacientes aguardando</th></tr></thead>
        <tbody>
          {byDestino.map(([d, n]) => (
            <tr key={d}>
              <td>{d}</td>
              <td>
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <div style={{flex:1, maxWidth:200, height:8, background:'#e2e8f0', borderRadius:99, overflow:'hidden'}}>
                    <div style={{width:`${Math.round((n/waiting.length)*100)}%`, height:'100%', background:'#6366f1', borderRadius:99}}/>
                  </div>
                  <span style={{fontWeight:700, color:'#6366f1'}}>{n}</span>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>}

    <div className="card">
      <div className="toolbar">
        <input placeholder="Buscar por nome ou destino..." value={q} onChange={e=>setQ(e.target.value)} />
        <span className="count-pill" style={{background:'#f0f0ff', color:'#6366f1', border:'1px solid #c7d2fe'}}>
          {filtered.length} paciente{filtered.length!==1?"s":""} em espera
        </span>
      </div>
      {loading ? <div className="loading">Carregando...</div> :
      waiting.length === 0
        ? <div className="empty-state">
            <IconVan/>
            <div>Nenhum paciente em lista de espera.</div>
            <div style={{fontSize:12, marginTop:6}}>Para adicionar, vá em "Nova solicitação" e selecione o status "Lista de espera".</div>
          </div>
        : filtered.length === 0
          ? <div className="empty-state"><IconVan/><div>Nenhum resultado para a busca.</div></div>
          : <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nome</th>
                  <th>Idade</th>
                  <th>Telefone</th>
                  <th>Destino</th>
                  <th>Prioridade</th>
                  <th>Data da Viagem</th>
                  <th>Tempo de espera</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((p, i) => (
                  <tr key={p.id}>
                    <td style={{color:'var(--muted)', fontWeight:700}}>{i+1}</td>
                    <td style={{fontWeight:600}}>{p.nome}</td>
                    <td>{calcIdade(p.nascimento)}</td>
                    <td>{p.telefone || "—"}</td>
                    <td>{p.destino || "—"}</td>
                    <td>{prioridadeBadge(p.prioridade)}</td>
                    <td>{fmt(p.dataViagem)}</td>
                    <td>
                      <span style={{
                        fontWeight:700,
                        color: !p.dataViagem ? 'var(--muted)'
                          : Math.floor((Date.now()-new Date(p.dataViagem+"T00:00"))/(24*3600*1000)) > 90 ? 'var(--danger)'
                          : Math.floor((Date.now()-new Date(p.dataViagem+"T00:00"))/(24*3600*1000)) > 30 ? 'var(--warn)'
                          : 'var(--ok)'
                      }}>
                        {diasEspera(p.dataViagem)}
                      </span>
                    </td>
                    <td>
                      <div className="row-actions">
                        <button className="icon-btn" title="Confirmar viagem" onClick={()=>setQuickSolicitacao(p)}><IconCheck/></button>
                        <button className="icon-btn" title="Editar solicitação" onClick={()=>onEdit(p)}><IconEdit/></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
      }
    </div>
    {quickSolicitacao && <QuickScheduleModal solicitacao={quickSolicitacao} motoristas={motoristas}
      onCancel={()=>setQuickSolicitacao(null)}
      onConfirm={async (motoristaId)=>{
        await save({...quickSolicitacao, status:"Agendado", motoristaId: motoristaId});
        notify(`Viagem de ${quickSolicitacao.nome} confirmada`);
        setQuickSolicitacao(null);
      }} />}
  </div>;
}

function ListaEditor({ titulo, itens, onChange }){
  const [novo, setNovo] = useState("");
  const [editIdx, setEditIdx] = useState(-1);
  const [editValor, setEditValor] = useState("");

  const adicionar = () => {
    const v = novo.trim();
    if(!v) return;
    if(itens.some(i => i.toLowerCase() === v.toLowerCase())) return;
    onChange([...itens, v]);
    setNovo("");
  };

  const iniciarEdicao = (idx) => { setEditIdx(idx); setEditValor(itens[idx]); };
  const salvarEdicao = () => {
    const v = editValor.trim();
    if(!v){ setEditIdx(-1); return; }
    onChange(itens.map((it,i)=> i===editIdx ? v : it));
    setEditIdx(-1);
  };
  const cancelarEdicao = () => setEditIdx(-1);
  const remover = (idx) => onChange(itens.filter((_,i)=>i!==idx));

  return <div className="card" style={{marginBottom:20}}>
    <div className="section-title">{titulo}</div>
    <div className="toolbar">
      <input placeholder={`Adicionar novo item...`} value={novo} onChange={e=>setNovo(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter') adicionar(); }} />
      <button className="btn btn-primary" onClick={adicionar}>Adicionar</button>
      <span className="count-pill">{itens.length} ite{itens.length!==1?"ns":"m"}</span>
    </div>
    {itens.length === 0
      ? <div className="empty-state" style={{padding:'24px 20px'}}><div>Nenhum item cadastrado ainda.</div></div>
      : <table>
          <tbody>
            {itens.map((it, idx) => (
              <tr key={idx}>
                <td>
                  {editIdx === idx
                    ? <input value={editValor} onChange={e=>setEditValor(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter') salvarEdicao(); if(e.key==='Escape') cancelarEdicao(); }} autoFocus />
                    : it}
                </td>
                <td style={{width:1}}>
                  <div className="row-actions">
                    {editIdx === idx
                      ? <button className="icon-btn" title="Salvar" onClick={salvarEdicao}><IconCheck/></button>
                      : <button className="icon-btn" title="Editar" onClick={()=>iniciarEdicao(idx)}><IconEdit/></button>}
                    <button className="icon-btn danger" title="Remover" onClick={()=>remover(idx)}><IconTrash/></button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
    }
  </div>;
}

function ListasTab({ listas, salvar, loading }){
  if(loading) return <div className="loading">Carregando...</div>;
  return <div>
    <ListaEditor titulo="Destino" itens={listas.destinos || []} onChange={(novo)=>salvar({...listas, destinos:novo})} />
    <ListaEditor titulo="Motivo / especialidade" itens={listas.motivos || []} onChange={(novo)=>salvar({...listas, motivos:novo})} />
    <ListaEditor titulo="Local" itens={listas.locais || []} onChange={(novo)=>salvar({...listas, locais:novo})} />
  </div>;
}

function ResumoDiaTodosMotoristas({ motoristas, solicitacoes }){
  const [data, setData] = useState("");
  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";

  const grupos = useMemo(() => {
    if(!data) return [];
    const doDia = solicitacoes.filter(p => p.status === "Agendado" && p.dataViagem === data);
    return motoristas
      .map(m => ({
        motorista: m,
        pacientes: doDia.filter(p => p.motoristaId === m.id)
          .sort((a,b)=>(a.horarioSaida||"").localeCompare(b.horarioSaida||""))
      }))
      .filter(g => g.pacientes.length > 0);
  }, [motoristas, solicitacoes, data]);

  const totalPacientes = grupos.reduce((s,g)=>s+g.pacientes.length, 0);

  return <div className="card">
    <div className="section-title hide-print" style={{marginTop:0}}>Resumo do dia — todos os motoristas</div>
    <div className="grid grid-2 hide-print">
      <Field label="Data da viagem">
        <input type="date" value={data} onChange={e=>setData(e.target.value)} />
      </Field>

      <button className="btn btn-primary" disabled={!data || grupos.length===0} onClick={()=>window.print()}>
        <IconPrint/> Imprimir resumo do dia
      </button>
      {data && <span className="count-pill">{grupos.length} motorista{grupos.length!==1?"s":""} · {totalPacientes} paciente{totalPacientes!==1?"s":""}</span>}
    </div>

    {!data ? (
      <div className="empty-state hide-print"><IconVan/><div>Selecione uma data para ver o resumo de todos os motoristas.</div></div>
    ) : grupos.length === 0 ? (
      <div className="empty-state hide-print"><IconVan/><div>Nenhuma viagem agendada para esta data.</div></div>
    ) : (
      grupos.map((g, idx) => (
        <div key={g.motorista.id} style={{marginTop: idx===0 ? 20 : 0, pageBreakBefore: idx>0 ? "always" : "auto", breakBefore: idx>0 ? "page" : "auto"}}>
          <PrintHeader subtitle={`Resumo do dia — ${fmt(data)}`} />
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", borderBottom:"2px solid var(--border-strong, #333)", paddingBottom:8, marginBottom:10, marginTop: idx>0 ? 20 : 0}}>
            <div>
              <div style={{fontSize:16, fontWeight:700}}>{g.motorista.nome}</div>
              <div style={{fontSize:12, color:"var(--muted)"}}>{g.motorista.tipoVeiculo}{g.motorista.placa ? " · " + g.motorista.placa : ""}</div>
            </div>
            <div style={{fontSize:13, fontWeight:600}}>{fmt(data)} — {g.pacientes.length} paciente{g.pacientes.length!==1?"s":""}</div>
          </div>
          <table>
            <thead>
              <tr><th>#</th><th>Paciente</th><th>Telefone</th><th>Destino</th><th>Horário</th><th>Ponto de referência</th><th>Acompanhante</th></tr>
            </thead>
            <tbody>
              {g.pacientes.map((p,i)=>(
                <tr key={p.id}>
                  <td>{i+1}</td>
                  <td style={{fontWeight:600}}>{p.nome}</td>
                  <td>{p.telefone || "—"}</td>
                  <td>{p.local || "—"}</td>
                  <td>{p.horarioSaida || "—"}</td>
                  <td>{p.pontoReferencia || "—"}</td>
                  <td>{p.acompanhante === "Sim" ? (p.nomeAcompanhante || "Sim") : "Não"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ))
    )}
  </div>;
}

function ImprimirRotaTab({ motoristas, solicitacoes, notify }){

  const [motoristaId, setMotoristaId] = useState("");
  const [tipoAgendamentoFiltro, setTipoAgendamentoFiltro] = useState("");
  const [dataFiltro, setDataFiltro] = useState("");
  const [horarioFiltro, setHorarioFiltro] = useState("");
  const [selecionados, setSelecionados] = useState(new Set());

  useEffect(()=>{ setTipoAgendamentoFiltro(""); setDataFiltro(""); setHorarioFiltro(""); }, [motoristaId]);
  useEffect(()=>{ setDataFiltro(""); setHorarioFiltro(""); }, [tipoAgendamentoFiltro]);
  useEffect(()=>{ setHorarioFiltro(""); }, [dataFiltro]);

  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";

  const agendadosDoMotorista = useMemo(() => {
    if(!motoristaId) return [];
    return solicitacoes.filter(p => p.status === "Agendado" && p.motoristaId === motoristaId);
  }, [solicitacoes, motoristaId]);

  const porTipo = useMemo(() => {
    return agendadosDoMotorista.filter(p => !tipoAgendamentoFiltro || p.tipoAgendamento === tipoAgendamentoFiltro);
  }, [agendadosDoMotorista, tipoAgendamentoFiltro]);

  const datasDisponiveis = useMemo(() => {
    const set = new Set(porTipo.map(p => p.dataViagem).filter(Boolean));
    return Array.from(set).sort();
  }, [porTipo]);

  const porData = useMemo(() => {
    return porTipo.filter(p => !dataFiltro || p.dataViagem === dataFiltro);
  }, [porTipo, dataFiltro]);

  const horariosDisponiveis = useMemo(() => {
    const set = new Set(porData.map(p => p.horarioSaida).filter(Boolean));
    return Array.from(set).sort();
  }, [porData]);

  const filtrados = useMemo(() => {
    return porData
      .filter(p => !horarioFiltro || p.horarioSaida === horarioFiltro)
      .sort((a,b) => {
        const da = a.dataViagem || "";
        const db = b.dataViagem || "";
        if(da !== db) return da.localeCompare(db);
        return (a.horarioSaida||"").localeCompare(b.horarioSaida||"");
      });
  }, [porData, horarioFiltro]);

  // Sempre que a lista filtrada muda (troca de motorista/filtros), marca todos por padrão.
  useEffect(() => {
    setSelecionados(new Set(filtrados.map(p => p.id)));
  }, [motoristaId, tipoAgendamentoFiltro, dataFiltro, horarioFiltro, agendadosDoMotorista]);

  const toggleUm = (id) => {
    setSelecionados(prev => {
      const next = new Set(prev);
      if(next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };
  const todosMarcados = filtrados.length > 0 && filtrados.every(p => selecionados.has(p.id));
  const toggleTodos = () => {
    setSelecionados(todosMarcados ? new Set() : new Set(filtrados.map(p => p.id)));
  };

  return <div>
    <div className="card hide-print" style={{marginBottom:16}}>
      <div className="toolbar" style={{marginBottom:0}}>
        <button className={modo==="motorista" ? "btn btn-primary" : "btn btn-secondary"} onClick={()=>setModo("motorista")}>Por motorista</button>
        <button className={modo==="resumo-dia" ? "btn btn-primary" : "btn btn-secondary"} onClick={()=>setModo("resumo-dia")}>Resumo do dia (todos os motoristas)</button>
      </div>
    </div>

    {modo === "resumo-dia" ? (
      <ResumoDiaTodosMotoristas motoristas={motoristas} solicitacoes={solicitacoes} />
    ) : (
    <div className="card">
    <div className="section-title hide-print">Selecionar motorista e filtros</div>
    <div className="grid grid-2">
      <Field label="Motorista / veículo">
        <select value={motoristaId} onChange={e=>setMotoristaId(e.target.value)}>
          <option value="">Selecione um motorista</option>
          {motoristas.map(m => <option key={m.id} value={m.id}>{m.nome} ({m.tipoVeiculo}{m.placa ? " - " + m.placa : ""})</option>)}
        </select>
      </Field>
      <Field label="Tipo de agendamento">
        <select value={tipoAgendamentoFiltro} onChange={e=>setTipoAgendamentoFiltro(e.target.value)} disabled={!motoristaId}>
          <option value="">Todos os tipos</option>
          <option>Normal</option>
          <option>Excepcional</option>
        </select>
      </Field>
    </div>
    <div className="grid grid-2" style={{marginTop:16}}>
      <Field label="Data da viagem">
        <select value={dataFiltro} onChange={e=>setDataFiltro(e.target.value)} disabled={!motoristaId}>
          <option value="">Todas as datas agendadas</option>
          {datasDisponiveis.map(d => <option key={d} value={d}>{fmt(d)}</option>)}
        </select>
      </Field>
      <Field label="Horário de saída">
        <select value={horarioFiltro} onChange={e=>setHorarioFiltro(e.target.value)} disabled={!motoristaId}>
          <option value="">Todos os horários</option>
          {horariosDisponiveis.map(h => <option key={h} value={h}>{h}</option>)}
        </select>
      </Field>
    </div>

    <div className="actions-row hide-print">
      <button className="btn btn-primary" disabled={!motoristaId || selecionados.size===0} onClick={()=>window.print()}>
        <IconPrint/> Imprimir rota selecionada
      </button>
      <span className="count-pill">{selecionados.size} de {filtrados.length} paciente{filtrados.length!==1?"s":""} selecionado{selecionados.size!==1?"s":""}</span>
    </div>

    <div className="section-title hide-print" style={{marginTop:26}}>Prévia da rota</div>
    {!motoristaId
      ? <div className="empty-state hide-print"><IconVan/><div>Selecione um motorista para ver a rota.</div></div>
      : filtrados.length === 0
        ? <div className="empty-state hide-print"><IconVan/><div>Nenhuma viagem agendada para este motorista com os filtros selecionados.</div></div>
        : <>
          <PrintHeader subtitle={`Rota — ${motoristas.find(m=>m.id===motoristaId)?.nome || ""}${dataFiltro ? " — " + fmt(dataFiltro) : ""}`} />
          <table>
            <thead>
              <tr>
                <th className="hide-print" style={{width:36}}>
                  <input type="checkbox" checked={todosMarcados} onChange={toggleTodos} />
                </th>
                <th>#</th><th>Paciente</th><th>Telefone</th><th>Endereço do paciente</th><th>Ponto de referência</th><th>Destino</th><th>Data</th><th>Agendado por</th><th>Observação</th><th>Acompanhante</th>
              </tr>
            </thead>
            <tbody>
              {filtrados.map((p, i) => (
                <tr key={p.id} className={selecionados.has(p.id) ? "" : "hide-print"}>
                  <td className="hide-print">
                    <input type="checkbox" checked={selecionados.has(p.id)} onChange={()=>toggleUm(p.id)} />
                  </td>
                  <td>{i+1}</td>
                  <td style={{fontWeight:600}}>{p.nome}</td>
                  <td>{p.telefone || "—"}</td>
                  <td>{p.endereco || "—"}</td>
                  <td>{p.pontoReferencia || "—"}</td>
                  <td>{p.local || "—"}</td>
                  <td>{fmt(p.dataViagem)}</td>
                  <td>{p.agendadoPor || "—"}</td>
                  <td>{p.obs || "—"}</td>
                  <td>{p.acompanhante === "Sim" ? (p.nomeAcompanhante || "Sim") : "Não"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
    }
    </div>
    )}
  </div>;
}

function PatientHistoryTab({ solicitacoes, motoristas }){
  const [q, setQ] = useState("");
  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";
  const motoristaName = (id) => { const m = (motoristas||[]).find(x=>x.id===id); return m ? m.nome : "—"; };

  const norm = (s) => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  // Agrupa por nome + CPF (mesma pessoa pode ter mais de uma solicitação)
  const pacientes = useMemo(() => {
    const groups = {};
    solicitacoes.forEach(p => {
      const key = norm(p.nome) + "|" + onlyDigits(p.cpf||"");
      if(!groups[key]) groups[key] = { nome: p.nome, cpf: p.cpf, viagens: [] };
      groups[key].viagens.push(p);
    });
    Object.values(groups).forEach(g => g.viagens.sort((a,b) => (b.dataViagem||"").localeCompare(a.dataViagem||"")));
    return Object.values(groups).sort((a,b) => (a.nome||"").localeCompare(b.nome||""));
  }, [solicitacoes]);

  const filtrados = useMemo(() => {
    if(!q.trim()) return [];
    const t = norm(q);
    const tDigits = onlyDigits(q);
    return pacientes.filter(pac =>
      norm(pac.nome).includes(t) || (tDigits && onlyDigits(pac.cpf||"").includes(tDigits))
    );
  }, [pacientes, q]);

  return <div className="card">
    <div className="section-title" style={{marginTop:0}}>Histórico do paciente</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:16}}>Busque por nome ou CPF para ver todas as viagens já cadastradas para essa pessoa.</p>
    <input placeholder="Buscar por nome ou CPF..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:20}} />

    {!q.trim() ? (
      <div className="empty-state"><IconSearch/><div>Digite um nome ou CPF para começar a busca.</div></div>
    ) : filtrados.length === 0 ? (
      <div className="empty-state"><IconSearch/><div>Nenhum paciente encontrado com esse nome/CPF.</div></div>
    ) : (
      filtrados.map(pac => (
        <div key={pac.nome + pac.cpf} style={{marginBottom:24}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", borderBottom:"1px solid var(--border, #e5e7eb)", paddingBottom:8, marginBottom:10}}>
            <div>
              <div style={{fontSize:16, fontWeight:700}}>{pac.nome}</div>
              <div style={{fontSize:12, color:"var(--muted)"}}>{pac.cpf ? "CPF/CNS: " + pac.cpf : "CPF/CNS não informado"}</div>
            </div>
            <span className="count-pill">{pac.viagens.length} viage{pac.viagens.length!==1?"ns":"m"}</span>
          </div>
          <table>
            <thead><tr><th>Data</th><th>Destino</th><th>Local</th><th>Motivo</th><th>Motorista</th><th>Status</th><th>Desfecho</th></tr></thead>
            <tbody>
              {pac.viagens.map(v => (
                <tr key={v.id}>
                  <td>{fmt(v.dataViagem)}</td>
                  <td>{v.destino || "—"}</td>
                  <td>{v.local || "—"}</td>
                  <td>{v.motivo || "—"}</td>
                  <td>{v.status === "Agendado" ? motoristaName(v.motoristaId) : "—"}</td>
                  <td><StatusBadge status={v.status}/></td>
                  <td>{v.resultadoViagem || "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ))
    )}
  </div>;
}

function DashboardTab({ solicitacoes }){
  const [fDataIni, setFDataIni] = useState("");
  const [fDataFim, setFDataFim] = useState("");

  const DESFECHO_COLORS = {
    "Realizada": "#16a34a",
    "Cancelada pela secretaria": "#d97706",
    "Cancelada pelo paciente": "#e03e3e",
    "Paciente faltou": "#7c3aed",
    "Sem desfecho": "#cbd5e1"
  };

  const filtradas = useMemo(() => {
    return solicitacoes.filter(p =>
      (!fDataIni || (p.dataViagem && p.dataViagem >= fDataIni)) &&
      (!fDataFim || (p.dataViagem && p.dataViagem <= fDataFim))
    );
  }, [solicitacoes, fDataIni, fDataFim]);

  const totalAgendadas = useMemo(() => filtradas.filter(p => p.status === "Agendado").length, [filtradas]);
  const totalEspera = useMemo(() => filtradas.filter(p => p.status === "Lista de espera").length, [filtradas]);

  const desfechoData = useMemo(() => {
    const counts = { "Realizada":0, "Cancelada pela secretaria":0, "Cancelada pelo paciente":0, "Paciente faltou":0, "Sem desfecho":0 };
    filtradas.forEach(p => {
      const k = RESULTADOS_VIAGEM.includes(p.resultadoViagem) ? p.resultadoViagem : "Sem desfecho";
      counts[k] = (counts[k] || 0) + 1;
    });
    const total = filtradas.length || 1;
    return Object.entries(counts)
      .filter(([,v]) => v > 0)
      .map(([label, value]) => ({ label, value, pct: Math.round((value/total)*100) }));
  }, [filtradas]);

  const conicGradient = useMemo(() => {
    let acc = 0;
    const total = filtradas.length || 1;
    const stops = desfechoData.map(d => {
      const start = (acc/total)*360;
      acc += d.value;
      const end = (acc/total)*360;
      return `${DESFECHO_COLORS[d.label]} ${start}deg ${end}deg`;
    });
    return stops.length ? `conic-gradient(${stops.join(",")})` : "conic-gradient(#e2e8f0 0deg 360deg)";
  }, [desfechoData, filtradas]);

  const destinoData = useMemo(() => {
    const counts = {};
    filtradas.forEach(p => { const d = p.destino || "Não informado"; counts[d] = (counts[d]||0) + 1; });
    return Object.entries(counts).map(([label,value]) => ({label,value})).sort((a,b)=>b.value-a.value).slice(0,8);
  }, [filtradas]);
  const maxDestino = Math.max(1, ...destinoData.map(d=>d.value));

  const localData = useMemo(() => {
    const counts = {};
    filtradas.forEach(p => { const d = p.local || "Não informado"; counts[d] = (counts[d]||0) + 1; });
    return Object.entries(counts).map(([label,value]) => ({label,value})).sort((a,b)=>b.value-a.value).slice(0,8);
  }, [filtradas]);
  const maxLocal = Math.max(1, ...localData.map(d=>d.value));

  const mesData = useMemo(() => {
    const counts = {};
    filtradas.filter(p => p.resultadoViagem === "Realizada").forEach(p => {
      if(!p.dataViagem) return;
      const key = p.dataViagem.slice(0,7); // YYYY-MM
      counts[key] = (counts[key] || 0) + 1;
    });
    return Object.entries(counts)
      .map(([key,value]) => {
        const [y,m] = key.split("-");
        const label = new Date(Number(y), Number(m)-1, 1).toLocaleDateString('pt-BR', {month:'short', year:'2-digit'});
        return { key, label, value };
      })
      .sort((a,b) => a.key.localeCompare(b.key));
  }, [filtradas]);
  const maxMes = Math.max(1, ...mesData.map(d=>d.value));

  const hasFilter = fDataIni || fDataFim;

  return <div className="dashboard-wrap" style={{position:"relative"}}>
    <img src={BRASAO_LOGO_URI} alt="Brasão do município" className="dashboard-logo" style={{
      position:"absolute", top:0, right:0, width:100, height:100, objectFit:"contain",
      border:"none", outline:"none", background:"transparent",
      filter:"drop-shadow(0 3px 8px rgba(0,0,0,.20))", zIndex:2
    }} />
    <div className="section-title" style={{margin:"0 120px 24px 0"}}>Painel de indicadores</div>
    <div className="card" style={{marginBottom:16}}>
      <div className="toolbar dashboard-toolbar" style={{marginBottom:0}}>
        <span className="dashboard-period" style={{display:"flex", alignItems:"center", gap:6, fontSize:13, color:"var(--muted)", flexWrap:"wrap"}}>
          Período: De <input type="date" style={{maxWidth:150}} value={fDataIni} onChange={e=>setFDataIni(e.target.value)} />
          até <input type="date" style={{maxWidth:150}} value={fDataFim} onChange={e=>setFDataFim(e.target.value)} />
        </span>
        {hasFilter && <button className="btn btn-secondary" style={{padding:'10px 14px'}} onClick={()=>{setFDataIni("");setFDataFim("");}}>Limpar período</button>}
      </div>
    </div>

    <div className="grid grid-2 dashboard-kpis" style={{marginBottom:16}}>
      <div className="card dashboard-kpi-card" style={{textAlign:"center"}}>
        <div style={{fontSize:13, color:"var(--muted)", marginBottom:6}}>Viagens agendadas {hasFilter ? "no período" : ""}</div>
        <div className="dashboard-kpi-num" style={{fontSize:36, fontWeight:700, color:"var(--accent)"}}>{totalAgendadas}</div>
      </div>
      <div className="card dashboard-kpi-card" style={{textAlign:"center"}}>
        <div style={{fontSize:13, color:"var(--muted)", marginBottom:6}}>Lista de espera {hasFilter ? "no período" : ""}</div>
        <div className="dashboard-kpi-num" style={{fontSize:36, fontWeight:700, color:"var(--warn, #d97706)"}}>{totalEspera}</div>
      </div>
    </div>

    <div className="grid grid-2 dashboard-charts" style={{alignItems:"stretch"}}>
      <div className="card">
        <div className="section-title" style={{marginTop:0}}>Desfecho das viagens {hasFilter ? "(período selecionado)" : ""}</div>
        {filtradas.length === 0 ? (
          <div className="empty-state"><IconVan/><div>Sem dados suficientes ainda.</div></div>
        ) : (
          <div style={{display:"flex", alignItems:"center", gap:28, flexWrap:"wrap"}}>
            <div className="dashboard-donut" style={{
              width:170, height:170, borderRadius:"50%", background:conicGradient,
              flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center"
            }}>
              <div style={{width:100, height:100, borderRadius:"50%", background:"var(--panel)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"}}>
                <div style={{fontSize:22, fontWeight:700}}>{filtradas.length}</div>
                <div style={{fontSize:11, color:"var(--muted)"}}>viagens</div>
              </div>
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:10, flex:1, minWidth:180}}>
              {desfechoData.map(d => (
                <div key={d.label} style={{display:"flex", alignItems:"center", gap:8, fontSize:13}}>
                  <span style={{width:10, height:10, borderRadius:3, background:DESFECHO_COLORS[d.label], flexShrink:0}}></span>
                  <span style={{flex:1, color:"var(--text)"}}>{d.label}</span>
                  <span style={{color:"var(--muted)", fontWeight:600}}>{d.value} ({d.pct}%)</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="card">
        <div className="section-title" style={{marginTop:0}}>Viagens por destino {hasFilter ? "(período selecionado)" : ""}</div>
        {destinoData.length === 0 ? (
          <div className="empty-state"><IconVan/><div>Sem dados suficientes ainda.</div></div>
        ) : (
          <div style={{display:"flex", flexDirection:"column", gap:12}}>
            {destinoData.map(d => (
              <div key={d.label}>
                <div style={{display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4}}>
                  <span>{d.label}</span>
                  <span style={{color:"var(--muted)", fontWeight:600}}>{d.value}</span>
                </div>
                <div style={{background:"var(--panel2)", borderRadius:6, height:10, overflow:"hidden"}}>
                  <div style={{width:`${(d.value/maxDestino)*100}%`, height:"100%", background:"var(--accent)", borderRadius:6}}></div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>

    <div className="card" style={{marginTop:16}}>
      <div className="section-title" style={{marginTop:0}}>Viagens por local {hasFilter ? "(período selecionado)" : ""}</div>
      {localData.length === 0 ? (
        <div className="empty-state"><IconVan/><div>Sem dados suficientes ainda.</div></div>
      ) : (
        <div className="dashboard-barchart" style={{display:"flex", alignItems:"flex-end", gap:14, height:220, padding:"10px 4px", overflowX:"auto"}}>
          {localData.map(d => (
            <div key={d.label} style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-end", height:"100%", minWidth:64}}>
              <div style={{fontSize:12, fontWeight:600, color:"var(--text)", marginBottom:4}}>{d.value}</div>
              <div style={{
                width:36, borderRadius:"6px 6px 0 0", background:"#0ea5e9",
                height:`${Math.max(6,(d.value/maxLocal)*150)}px`
              }}></div>
              <div style={{fontSize:11, color:"var(--muted)", marginTop:6, textAlign:"center", maxWidth:80, wordBreak:"break-word"}}>{d.label}</div>
            </div>
          ))}
        </div>
      )}
    </div>

    <div className="card" style={{marginTop:16}}>
      <div className="section-title" style={{marginTop:0}}>Viagens realizadas por mês {hasFilter ? "(período selecionado)" : ""}</div>
      {mesData.length === 0 ? (
        <div className="empty-state"><IconVan/><div>Sem dados suficientes ainda.</div></div>
      ) : (
        <div className="dashboard-barchart" style={{display:"flex", alignItems:"flex-end", gap:14, height:200, padding:"10px 4px", overflowX:"auto"}}>
          {mesData.map(d => (
            <div key={d.key} style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-end", height:"100%", minWidth:44}}>
              <div style={{fontSize:12, fontWeight:600, color:"var(--text)", marginBottom:4}}>{d.value}</div>
              <div style={{
                width:28, borderRadius:"6px 6px 0 0", background:"var(--accent)",
                height:`${Math.max(6,(d.value/maxMes)*140)}px`
              }}></div>
              <div style={{fontSize:11, color:"var(--muted)", marginTop:6, textTransform:"capitalize"}}>{d.label}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  </div>;
}

    <div className="banner hide-print">
      <span>⚠</span>
      <span>Versão de transição: dados compartilhados entre a equipe via este link. Trate o acesso como confidencial e não compartilhe fora da equipe.</span>
    </div>

    <div className="tabs hide-print">
      {tabs.map(t => (
        <button key={t.id} className={"tab" + (tab===t.id ? " active" : "")} onClick={()=>{ setTab(t.id); if(t.id!=="cadastro") setEditingSolicitacao(null); }}>
          {t.icon}{t.label}
        </button>
      ))}
    </div>

    {tab === "dashboard" && (
      <DashboardTab solicitacoes={sol.items} />
    )}

    {tab === "cadastro" && (
      <SolicitacaoForm save={sol.save} notify={notify}
        motoristas={mot.items}
        solicitacoes={sol.items}
        listas={listasCfg.listas}
        editTarget={editingSolicitacao}
        onDone={()=>{ setEditingSolicitacao(null); setTab("solicitacoes"); }}
        onRequestDelete={(p)=>setConfirmDel(p)} />
    )}

    {tab === "solicitacoes" && (
      <SolicitacoesList solicitacoes={sol.items} loading={sol.loading}
        motoristas={mot.items}
        save={sol.save}
        onEdit={(p)=>{ setEditingSolicitacao(p); setTab("cadastro"); }}
        onDelete={(p)=>setConfirmDel(p)} />
    )}

    {tab === "motoristas" && (
      <MotoristasTab motoristas={mot.items} loading={mot.loading} save={mot.save} remove={mot.remove} notify={notify} solicitacoes={sol.items} />
    )}

    {tab === "imprimir-rota" && (
      <ImprimirRotaTab motoristas={mot.items} solicitacoes={sol.items} notify={notify} />
    )}

    {tab === "listas" && (
      <ListasTab listas={listasCfg.listas} loading={listasCfg.loading} salvar={listasCfg.salvar} />
    )}

    {tab === "historico-paciente" && (
      <PatientHistoryTab solicitacoes={sol.items} motoristas={mot.items} />
    )}

    {tab === "exportar" && (
      <ExportTab solicitacoes={sol.items} motoristas={mot.items} notify={notify} />
    )}

    {confirmDel && (() => {
      const vinculado = confirmDel.status === "Agendado" && confirmDel.motoristaId;
      const motoristaNome = vinculado ? (mot.items.find(x=>x.id===confirmDel.motoristaId)?.nome || "um motorista") : null;
      return <ConfirmModal title="Excluir solicitação"
        text={vinculado
          ? `Atenção: a viagem de "${confirmDel.nome}" está agendada com ${motoristaNome}. Excluir o cadastro removerá esse vínculo permanentemente e não poderá ser desfeito. Deseja continuar?`
          : `Tem certeza que deseja excluir a solicitação de "${confirmDel.nome}"? Essa ação não pode ser desfeita.`}
        onCancel={()=>setConfirmDel(null)}
        onConfirm={async ()=>{ await sol.remove(confirmDel.id); notify("Solicitação excluída"); setConfirmDel(null); setEditingSolicitacao(null); setTab("solicitacoes"); }} />;
    })()}

    <Toast message={toast} />
  </div>;
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
